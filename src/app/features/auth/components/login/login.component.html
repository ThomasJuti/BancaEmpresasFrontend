<div class="login">
  <section class="login-panel">
    <div class="login-content">
      <div class="brand">
        <span class="brand-mark">O</span>
        <span class="brand-name">ORUS</span>
      </div>

      <h1 class="login-title">Bienvenido al portal de Gestion de Tarjetas de Credito</h1>

      <button
        type="button"
        class="google-btn"
        [disabled]="loading()"
        (click)="continueWithGoogle()"
      >
        <svg class="google-icon" width="20" height="20" viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.6l6.7-6.7C35.6 2.6 30.1 0 24 0 14.6 0 6.5 5.4 2.6 13.2l7.8 6.1C12.3 13.2 17.6 9.5 24 9.5z" />
          <path fill="#4285F4" d="M46.1 24.6c0-1.6-.1-3.1-.4-4.6H24v9.1h12.4c-.5 2.9-2.1 5.3-4.6 6.9l7.1 5.5c4.1-3.8 6.5-9.4 6.5-16.9z" />
          <path fill="#FBBC05" d="M10.4 28.3c-.5-1.4-.8-2.9-.8-4.3s.3-3 .8-4.3l-7.8-6.1C1 16.6 0 20.2 0 24s1 7.4 2.6 10.4l7.8-6.1z" />
          <path fill="#34A853" d="M24 48c6.1 0 11.3-2 15-5.5l-7.1-5.5c-2 1.4-4.6 2.2-7.9 2.2-6.4 0-11.7-3.7-13.6-9.8l-7.8 6.1C6.5 42.6 14.6 48 24 48z" />
        </svg>
        <span>{{ loading() ? 'Ingresando…' : 'Continuar con Google' }}</span>
      </button>

      @if (error()) {
      <p class="login-error">{{ error() }}</p>
      }

      <p class="login-legal">
        Este sitio está protegido por reCAPTCHA y aplican las
        <a href="#" (click)="$event.preventDefault()">políticas de privacidad</a> y los
        <a href="#" (click)="$event.preventDefault()">términos de servicio</a>.
        Versión {{ appVersion }}
      </p>
    </div>
  </section>

  <aside class="login-hero" aria-hidden="true">
    <svg class="hero-art" viewBox="0 0 600 600" preserveAspectRatio="xMidYMid slice">
      <defs>
        <linearGradient id="orusHero" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#0f4c97" />
          <stop offset="1" stop-color="#002f87" />
        </linearGradient>
      </defs>
      <rect width="600" height="600" fill="url(#orusHero)" />
      <circle cx="150" cy="150" r="120" fill="#ffffff" opacity="0.08" />
      <circle cx="470" cy="90" r="70" fill="#ffffff" opacity="0.06" />
      <path d="M300 0 L600 0 L600 300 Z" fill="#ffffff" opacity="0.05" />
      <g stroke="#8fbaf0" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9">
        <path d="M120 470 l70 -70 M190 400 l0 45 M190 400 l-45 0" />
        <path d="M420 300 l90 -90 M510 210 l0 60 M510 210 l-60 0" />
        <path d="M300 520 l60 -60 M360 460 l0 40 M360 460 l-40 0" />
      </g>
    </svg>
  </aside>
</div>
